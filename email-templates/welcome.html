<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Fixonic</title>
</head>
<body style="margin:0; padding:0; font-family: 'Segoe UI', system-ui, sans-serif; background:#f1f5f9;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9; padding: 24px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 420px; background:#fff; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(10, 25, 47, 0.08);">
          <!-- Header -->
          <tr>
            <td style="background: #0A192F; padding: 28px 32px; text-align: center;">
              <span style="display: inline-block; background: #99FF00; color: #0A192F; font-weight: 800; font-size: 18px; padding: 8px 14px; border-radius: 12px;">Fixonic</span>
              <p style="color: rgba(255,255,255,0.9); font-size: 14px; margin: 12px 0 0 0;">Welcome aboard</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 32px 28px;">
              <p style="color: #334155; font-size: 16px; line-height: 1.6; margin: 0 0 16px 0;">Hi {{name}},</p>
              <p style="color: #334155; font-size: 16px; line-height: 1.6; margin: 0 0 24px 0;">Thanks for joining Fixonic. Book repairs, shop accessories, or manage your account from your dashboard.</p>
              <p style="text-align: center; margin: 0;">
                <a href="{{loginUrl}}" style="display: inline-block; background: #99FF00; color: #0A192F; font-weight: 700; font-size: 14px; padding: 14px 28px; border-radius: 14px; text-decoration: none;">Go to Fixonic</a>
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 20px 28px; border-top: 1px solid #f1f5f9;">
              <p style="color: #94a3b8; font-size: 12px; margin: 0; text-align: center;">Fixonic – Device repair & services</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
